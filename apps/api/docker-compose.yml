version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: paper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-paper_redis_2024}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 可选：Redis 可视化管理工具
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: paper-redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:paper_redis_2024
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  redis-data: