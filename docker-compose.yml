version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: thesis-postgres
    restart: always
    environment:
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: thesis
      POSTGRES_DB: thesis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: